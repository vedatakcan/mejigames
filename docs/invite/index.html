<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>

<script>
  const ua = navigator.userAgent || navigator.vendor;

  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  const iosStore = "https://apps.apple.com/tr/app/meji-brain-training/id6752789849";
  const androidStore = "https://play.google.com/store/apps/details?id=com.vedatakcan.meji";

  if (isIOS) {
    window.location.href = iosStore;
  } 
  else if (isAndroid) {
    window.location.href = androidStore;
  } 
  else {
    window.location.href = "https://vedatakcan.github.io/mejigames/";
  }
</script>

</body>
</html>
