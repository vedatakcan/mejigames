<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meji</title>
</head>
<body>

<script>
  const ua = navigator.userAgent || navigator.vendor || window.opera;

  const isAndroid = /Android/i.test(ua);
  const isIOS = /iPhone|iPad|iPod/i.test(ua);

  const iosStore = "https://apps.apple.com/app/id6752789849";
  const androidStore = "https://play.google.com/store/apps/details?id=com.vedatakcan.meji";

  if (isIOS) {
    window.location.replace(iosStore);
  } else if (isAndroid) {
    window.location.replace(androidStore);
  } else {
    window.location.replace("https://vedatakcan.github.io/mejigames/");
  }
</script>

</body>
</html>
